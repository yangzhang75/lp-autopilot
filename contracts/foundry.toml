[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@uniswap/v3-core/=lib/v3-core/contracts/",
    "@uniswap/v3-periphery/=lib/v3-periphery/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
arbitrum_mainnet = "${ARBITRUM_MAINNET_RPC_URL}"

# `FOUNDRY_PROFILE=ci` in GitHub Actions; inherits from default
[profile.ci]
fuzz = { runs = 256 }
